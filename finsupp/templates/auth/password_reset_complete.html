{% extends "auth/base_auth.html" %}

{% block title %}Senha Alterada - FinSupp{% endblock %}

{% block heading %}Senha redefinida com sucesso!{% endblock %}

{% block content %}
<div class="text-center">
    <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-green-100 mb-4">
        <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
        </svg>
    </div>
    
    <p class="text-sm text-slate-600 mb-8">
        Sua senha foi redefinida. Agora você já pode fazer login com a sua nova senha.
    </p>

    <div class="pt-2">
        <a href="{% url 'accounts:login' %}" class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2.5 text-sm font-semibold leading-6 text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 transition-colors duration-200">
            Fazer Login
        </a>
    </div>
</div>
{% endblock %}
