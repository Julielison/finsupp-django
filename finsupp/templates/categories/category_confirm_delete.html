{% extends 'base.html' %}

{% block title %}Excluir categoria - FinSupp{% endblock %}

{% block content %}
<section class="mx-auto max-w-2xl">
    <div class="rounded-3xl border border-red-200 bg-white p-6 shadow-sm">
        <p class="text-sm font-semibold uppercase tracking-[0.2em] text-red-600">Atenção</p>
        <h1 class="mt-2 text-3xl font-bold tracking-tight text-slate-900">Excluir categoria</h1>
        <p class="mt-3 text-sm leading-6 text-slate-600">
            Você está prestes a excluir a categoria <strong>{{ object.description }}</strong>. Essa ação não pode ser desfeita.
        </p>

        <form method="post" class="mt-6 flex flex-wrap gap-3">
            {% csrf_token %}
            <button type="submit" class="inline-flex items-center rounded-xl bg-red-600 px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-red-500">
                Confirmar exclusão
            </button>
            <a href="{% url 'categories:list' %}" class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-5 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50">
                Cancelar
            </a>
        </form>
    </div>
</section>
{% endblock %}
