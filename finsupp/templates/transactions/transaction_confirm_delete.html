{% extends 'base.html' %}

{% block title %}Excluir Transação - FinSupp{% endblock %}

{% block content %}
<section class="mx-auto max-w-lg space-y-6">
    <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm text-center">
        <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-red-100 mb-4">
            <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        
        <h1 class="text-xl font-bold tracking-tight text-slate-900">Excluir transação</h1>
        <p class="mt-2 text-sm text-slate-600">
            Tem certeza que deseja excluir a transação <strong>{{ object.description }}</strong>? Esta ação não pode ser desfeita.
        </p>

        <form method="post" class="mt-6 flex items-center justify-center gap-3">
            {% csrf_token %}
            <a href="{% url 'transactions:list' %}" class="inline-flex justify-center rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50">
                Cancelar
            </a>
            <button type="submit" class="inline-flex justify-center rounded-xl bg-red-600 px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-red-500">
                Sim, excluir
            </button>
        </form>
    </div>
</section>
{% endblock %}
